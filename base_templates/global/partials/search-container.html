<div class="search-container">
    <div class="container">
        <form action="{% url " recipes:search" %}" class="search-form">
            <input placeholder="Search for a recipe..." type="search" class="search-input" name="q" required
                value="{{search_term}}">
            <button class="search-button" type="submit">
                <i class="fas fa-search"></i>
            </button>
        </form>
    </div>
</div>
